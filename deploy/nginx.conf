server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve index.html for unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + static media are reverse-proxied to the FastAPI service.
    location = /health      { proxy_pass http://api:8000; }
    location /profile/      { proxy_pass http://api:8000; }
    location /content/      { proxy_pass http://api:8000; }
    location /static/       { proxy_pass http://api:8000; }
}
